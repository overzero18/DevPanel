<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPanel - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #252525;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .login-title {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .form-control {
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
        }
        .form-control:focus {
            background: #1a1a1a;
            border-color: #007bff;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .form-control::placeholder {
            color: #666;
        }
        .btn-devpanel {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: none;
            color: #fff;
            font-weight: bold;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .btn-devpanel:hover {
            background: linear-gradient(135deg, #0056b3 0%, #004085 100%);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }
        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            color: #ccc;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">DevPanel</h1>

        <form id="loginForm">
            <div class="form-group">
                <label for="username" class="form-label">Usuario</label>
                <input
                    type="text"
                    id="username"
                    class="form-control"
                    placeholder="admin"
                    autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Ingresa la contraseña"
                    required>
            </div>

            <div class="form-group" id="twoFactorGroup" style="display: none;">
                <label for="twoFactorCode" class="form-label">Código 2FA</label>
                <input
                    type="text"
                    id="twoFactorCode"
                    class="form-control"
                    inputmode="numeric"
                    pattern="[0-9]{6}"
                    maxlength="6"
                    autocomplete="one-time-code"
                    placeholder="123456">
            </div>

            <button type="submit" class="btn btn-devpanel">Acceder</button>

            <div class="error-message" id="errorMessage"></div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value || 'admin';
            const twoFactorCode = document.getElementById('twoFactorCode').value;
            const errorDiv = document.getElementById('errorMessage');
            const twoFactorGroup = document.getElementById('twoFactorGroup');

            try {
                const body = new URLSearchParams();
                body.set('username', username);
                body.set('password', password);
                if (twoFactorCode) body.set('two_factor_code', twoFactorCode);

                const response = await fetch('/devpanel/api/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: body.toString()
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/devpanel/';
                } else if (data.two_factor_required) {
                    twoFactorGroup.style.display = 'block';
                    document.getElementById('twoFactorCode').focus();
                    errorDiv.textContent = data.message || 'Introduce tu código 2FA';
                    errorDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = data.message || 'Error al iniciar sesión';
                    errorDiv.style.display = 'block';
                    document.getElementById('twoFactorCode').value = '';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        });

        fetch('/devpanel/api/session_status.php')
            .then(response => response.json())
            .then(data => {
                if (data.authenticated) {
                    window.location.href = '/devpanel/';
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
