name: DevPanel checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: sqlite3, pdo_sqlite, zip
          coverage: none

      - name: PHP lint
        run: |
          find . \
            -path './vendor' -prune -o \
            -path './tmp' -prune -o \
            -path './logs' -prune -o \
            -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Bash syntax
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Unit tests
        run: php scripts/devpanel-unit-tests.php

      - name: Whitespace
        run: git diff --check

      - name: Public secret guard
        run: |
          if git ls-files --error-unmatch config.php >/dev/null 2>&1; then
            echo "config.php must stay untracked"
            exit 1
          fi
          if git ls-files -z | xargs -0 grep -InE '(dp_[A-Za-z0-9]{32,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]+)' -- 2>/dev/null; then
            echo "Possible secret found"
            exit 1
          fi
