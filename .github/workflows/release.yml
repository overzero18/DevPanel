name: DevPanel release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build archive
        run: |
          bash ./scripts/devpanel-build-release.sh
          cp "tmp/releases/devpanel-${GITHUB_REF_NAME}.zip" "devpanel-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: devpanel-${{ github.ref_name }}.zip
          generate_release_notes: true
